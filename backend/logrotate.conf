/var/www/html/tng-finhack/backend/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 hackgpt hackgpt
    sharedscripts
    postrotate
        # Signal gunicorn to reopen log files
        if [ -f /var/www/html/tng-finhack/backend/.gunicorn.pid ]; then
            kill -USR1 $(cat /var/www/html/tng-finhack/backend/.gunicorn.pid) 2>/dev/null || true
        fi
    endscript
}
